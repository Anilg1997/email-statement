<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bank Statement Replacer</title>
<style>
body { width: 320px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; }
h2 { margin: 0 0 16px 0; font-size: 18px; color: #fff; border-bottom: 1px solid #333; padding-bottom: 8px; }
label { display: block; margin-bottom: 6px; font-size: 13px; color: #aaa; }
input { width: 100%; padding: 8px 10px; border: 1px solid #333; border-radius: 4px; background: #16213e; color: #e0e0e0; font-size: 14px; box-sizing: border-box; margin-bottom: 12px; }
input:focus { outline: none; border-color: #4a9eff; }
button { width: 100%; padding: 10px; background: #4a9eff; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; font-weight: 600; }
button:hover { background: #3a8eef; }
#status { margin-top: 12px; padding: 8px; border-radius: 4px; font-size: 13px; display: none; }
#status.success { display: block; background: #1a3a2a; color: #4caf50; border: 1px solid #2e7d32; }
#status.error { display: block; background: #3a1a1a; color: #f44336; border: 1px solid #c62828; }
.hint { font-size: 11px; color: #666; margin-top: -8px; margin-bottom: 12px; }
</style>
</head>
<body>
<h2>Bank Statement Replacer</h2>
<label for="bankUrl">Bank Domain URL</label>
<input type="text" id="bankUrl" placeholder="https://your-bank.com" />
<div class="hint">Domain where your bank serves PDF statements</div>
<label for="accountId">Account ID / Username</label>
<input type="text" id="accountId" placeholder="e.g. 1234567890" />
<div class="hint">Must match the account used in Statement Editor</div>
<button id="saveBtn">Save Settings</button>
<div id="status"></div>
<script src="popup.js"></script>
</body>
</html>
